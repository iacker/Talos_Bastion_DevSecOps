# Traefik Ingress Controller configuration
# Chart: traefik/traefik v39.x
# LoadBalancer IP: 192.168.1.240 (via Cilium L2)

service:
  type: LoadBalancer
  annotations:
    io.cilium/lb-ipam-ips: "192.168.1.240"

ports:
  web:
    port: 8000
    exposedPort: 80
    protocol: TCP
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    port: 8443
    exposedPort: 443
    protocol: TCP
    http:
      tls:
        enabled: true
  gitea-ssh:
    port: 2222
    exposedPort: 22
    protocol: TCP
    expose:
      default: true
  teleport:
    port: 8444
    exposedPort: 8443
    protocol: TCP
    expose:
      default: true

# TLS default self-signed certificate
tlsStore:
  default:
    defaultGeneratedCert:
      resolver: ""
      domain:
        main: "talos.local"
        sans:
          - "*.talos.local"

# Enable Traefik CRD provider (IngressRoute)
providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true

# Disable sending anonymous usage data
additionalArguments:
  - "--global.sendanonymoususage=false"

# Dashboard accessible via IngressRoute (not exposed directly)
ingressRoute:
  dashboard:
    enabled: false

# Logs
logs:
  general:
    level: INFO
  access:
    enabled: true
