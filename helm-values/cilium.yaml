# Cilium CNI configuration for Talos
# Chart: cilium/cilium v1.19.0

ipam:
  mode: kubernetes

k8sServiceHost: localhost
k8sServicePort: 7445

kubeProxyReplacement: true

# L2 announcements for LoadBalancer services (ARP on LAN)
l2announcements:
  enabled: true

# Required for L2 announcements to avoid agent rate-limiting
k8sClientRateLimit:
  qps: 50
  burst: 100

hubble:
  relay:
    enabled: true
  ui:
    enabled: true

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
