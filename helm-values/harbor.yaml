# Harbor configuration
# Chart: harbor/harbor v1.18.2

# harborAdminPassword: <SET VIA --set harborAdminPassword=XXX>

expose:
  type: clusterIP
  tls:
    enabled: false

externalURL: https://harbor.talos.local

persistence:
  persistentVolumeClaim:
    registry:
      size: 20Gi
    database:
      size: 5Gi
    redis:
      size: 1Gi
    trivy:
      size: 5Gi
    jobservice:
      jobLog:
        size: 1Gi
