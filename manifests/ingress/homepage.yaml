# Homepage IngressRoute
# home.talos.local → homepage:3000
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: homepage
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`home.talos.local`)
      kind: Rule
      services:
        - name: homepage
          port: 3000
  tls: {}
