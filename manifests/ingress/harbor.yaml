# Harbor IngressRoute
# harbor.talos.local → harbor-portal:80 (UI) + harbor-core:80 (API/v2)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: harbor
  namespace: harbor
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`harbor.talos.local`) && PathPrefix(`/api/`, `/service/`, `/v2/`, `/chartrepo/`, `/c/`)
      kind: Rule
      services:
        - name: harbor-core
          port: 80
    - match: Host(`harbor.talos.local`)
      kind: Rule
      services:
        - name: harbor-portal
          port: 80
  tls: {}
