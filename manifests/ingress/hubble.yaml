# Hubble UI IngressRoute
# hubble.talos.local → hubble-ui:80
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hubble-ui
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hubble.talos.local`)
      kind: Rule
      services:
        - name: hubble-ui
          port: 80
  tls: {}
